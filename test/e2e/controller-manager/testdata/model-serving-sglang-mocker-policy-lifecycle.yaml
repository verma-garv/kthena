# ModelServing for controller-manager autoscale e2e (policy lifecycle).
# SGLang-format Prometheus metrics on :30000/metrics (dynamo-mocker-sglang).
# Autoscale tests assume pinned image emits sglang:token_usage (gauge/counter) such that after
# scale-down to one entry pod, aggregate sum / 0.1 >= 5 so maxReplicas can be reached (target "100m").

apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelServing
metadata:
  name: autoscale-policy-lifecycle-ms
spec:
  replicas: 4
  rolloutStrategy:
    type: ServingGroupRollingUpdate
    rollingUpdateConfiguration:
      maxUnavailable: 2
  template:
    roles:
      - name: prefill
        replicas: 1
        entryTemplate:
          spec:
            containers:
              - name: leader
                image: ghcr.io/faust-benchou/sglang-inference-sim:0.1.1
                imagePullPolicy: IfNotPresent
                args:
                  - --model=kthena-mock-sglang
                  - --served-model-name=Qwen/Qwen3-8B
                  - --port=30000
                  - --mode=echo
                  - --time-to-first-token=0ms
                  - --inter-token-latency=0ms
                ports:
                  - name: metrics
                    containerPort: 30000
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 30000
                  initialDelaySeconds: 2
                  periodSeconds: 2
        workerReplicas: 0
